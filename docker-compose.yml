services:
  # Python програма
  app:
    build: .
    container_name: devops_pz1_app
    restart: always
    depends_on:
      - db
    networks:
      - pz1_network

  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: devops_pz1_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - pz1_network

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: devops_pz1_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - pz1_network

networks:
  pz1_network:
    driver: bridge

volumes:
  pg_data: